<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Give Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <script>
        window.onload = function() {
            const message = new URLSearchParams(window.location.search).get('message');
            if (message) {
                alert(message);
            }
        }
    </script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="theme-switch-wrapper">
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" onchange="toggleThemeAndAnimation()">
            <span class="slider"></span>
        </label>
    </div>
    <div class="animation-switch-wrapper">
        <label class="animation-switch">
            <input type="checkbox" id="animation-toggle" onchange="toggleAnimation()">
            <span class="slider"></span>
        </label>
    </div>
    <header class="header">
        <h1>Give Feedback</h1>
        <p>We value your feedback. Please fill out the form below.</p>
    </header>
    <main class="main-content">

        <form action="{{ url_for('submit_feedback') }}" class="form-container" method="POST">
            <h1>Feedback Form</h1>
             
            <label for="grievance_id">Grievance ID:</label>
            <select id="grievance_id" name="grievance_id" required>
                {% for grievance in grievances %}
                <option value="{{ grievance.grievance_id }}">{{ grievance.grievance_id }} - {{ grievance.description }}</option>
                {% endfor %}
            </select>

            <label for="rating">Rating:</label>
            <span class="rate">
                <input type="radio" id="star5" name="rating" value="5" />
                <label for="star5" title="5 stars">5 stars</label>
                <input type="radio" id="star4" name="rating" value="4" />
                <label for="star4" title="4 stars">4 stars</label>
                <input type="radio" id="star3" name="rating" value="3" />
                <label for="star3" title="3 stars">3 stars</label>
                <input type="radio" id="star2" name="rating" value="2" />
                <label for="star2" title="2 stars">2 stars</label>
                <input type="radio" id="star1" name="rating" value="1" />
                <label for="star1" title="1 star">1 star</label>
            </span><br><br><br>
            <label for="comments">Comments:</label>
            <textarea id="comments" name="comments" required></textarea>
            <button type="submit">Submit Feedback</button>
        </form>
    </main>
    <footer class="footer">
        <p>© 2025 College Anti-Grievance System. All rights reserved.</p>
    </footer>
    <script src="{{ url_for('static', filename='tr.js') }}"></script>
</body>
</html>
