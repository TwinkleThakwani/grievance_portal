<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigator Performance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            width: 500px; /* Adjust the width */
            height: 300px; /* Adjust the height */
            margin: 20px auto; /* Center the chart */
        }
    </style>
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" onchange="toggleThemeAndAnimation()">
            <span class="slider"></span>
        </label>
    </div>
    <header class="header">
        <h1>Investigator Performance</h1>
        <p>View performance metrics of investigators.</p>
    </header>
    <main class="main-content">
        <!-- Investigator Performance Chart -->
        <h2>Investigator Performance</h2>
        <div class="chart-container">
            <canvas id="performanceGraph"></canvas>
        </div>
    </main>
    <footer class="footer">
        <p>© 2025 College Anti-Grievance System. All rights reserved.</p>
    </footer>
    <script src="{{ url_for('static', filename='tr.js') }}"></script>
    <script>

        // Dummy data for Investigator Performance
        const performanceData = [
            { investigator_name: 'Investigator One', resolved_cases: 5, avg_resolution_time: 3 },
            { investigator_name: 'Investigator Two', resolved_cases: 8, avg_resolution_time: 4 },
            { investigator_name: 'Investigator Three', resolved_cases: 3, avg_resolution_time: 7 }
        ];

        // Map the data to labels and datasets
        const labels = performanceData.map(item => item.investigator_name);
        const resolvedCases = performanceData.map(item => item.resolved_cases);
        const avgResolutionTime = performanceData.map(item => item.avg_resolution_time);

        // Render Investigator Performance Chart
        const performanceCtx = document.getElementById('performanceGraph').getContext('2d');
        const performanceGraph = new Chart(performanceCtx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Resolved Cases',
                        data: resolvedCases,
                        backgroundColor: 'rgba(75, 192, 192, 0.6)',
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 1
                    },
                    {
                        label: 'Avg Resolution Time (Days)',
                        data: avgResolutionTime,
                        backgroundColor: 'rgba(153, 102, 255, 0.6)',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        borderWidth: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, /* Allow custom sizing */
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
